        href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"

</head>

<body>
    <header>
        <div class="mobile-header">
            <img src="images/favicon.ico" alt="Tegucigalpa Chamber of Commerce Logo" width="48" height="48">
            <span>Tegucigalpa Chamber of Commerce</span>
            <button id="ham-btn" class="" aria-label="close & open button"></button>
        </div>
        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discovery</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li class="current"><a href="join.html">Join</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h1>Join Chamber</h1>
        <div id="form-membership" class="form-membership">
            <form action="thankyou.html" class="application" method="get">
                    <fieldset>
                        <legend>Membership Application Form</legend>
                        <label for="fName">First Name <input type="text" name="fName" id="fName" autocomplete="given-name" title="Please enter your first name" required></label>
                        <label for="lName">Last Name <input type="text" name="lName" id="lName" autocomplete="family-name" title="Please enter your last name" required></label>
                        <label for="oTitle">Organization Title <input type="text" name="oTitle" id="oTitle" autocomplete="organization-title" title="Please enter your title within your company which should be at least 7 characters using only letters, hyphens, and spaces." pattern="[A-Za-z\s\-]{7,}" required></label>
                        <label for="email">Email <input type="email" name="email" id="email" autocomplete="email" title="Please enter a valid email address (example: johndoe@email.com)" placeholder="youremail@email.com" required></label>
                        <label for="phone-number">Mobile Phone Number <input type="tel" name="phone-number" id="phone-number" autocomplete="tel" title="Please enter your mobile phone-number" required></label>
                        <label for="businessName">Business/Organization Name <input type="text" name="businessName" id="businessName" autocomplete="organization" title="Please enter your business name" required></label>
                        <label for="membership-level">Membership level <select name="membership-level" id="membership-level" required>
                        <option value="" disabled selected>Select a membership level...</option>
                        <option value="bronze">Bronze Membership</option>
                        <option value="silver">Silver Membership</option>
                        <option value="gold">Gold Membership</option>
                        <option value="np">NP Membership</option>
                        </select></label>
                        <label for="businessInfo">Business/Organization Description <textarea name="businessInfo" id="businessInfo" title="Form input for a brief description about your business/organization"></textarea></label>
                        <input type="hidden" id="timestamp" name="timestamp">
                        <input type="submit" aria-label="button to send your chamber application" value="Send Chamber Application" class="form-button">
                    </fieldset>
                </form>
                <div id="membership-levels" class="membership-levels">
                    
                </div>
        </div>  
            <dialog id="memberships" class="memberships"></dialog>
    </main>
    <footer>
        <div class="demographics">
            <p>Tegucigalpa Chamber of Commerce</p>
            <address>7th Avenue 15th St<br>
                Tegucigalpa, HN 11011<br>
                <a href="mailto">info@tegucigalpacc.com</a>
            </address>
        </div>

        <div class="social-media icons">
            <a href="#"><img src="images/facebook.svg" alt="facebook icon"></a>
            <a href="#"><img src="images/twitter-x.svg" alt="twitter-x icon"></a>
            <a href="#"><img src="images/whatsapp.svg" alt="whatsapp icon"></a>
        </div>
        <div class="footer-text">
            <p>WDD231 Class Project - Axzam Bendeck</p>
            <p>© <span id="currentYear"></span> Tegucigalpa Chamber of Commerce</p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>

</html>
